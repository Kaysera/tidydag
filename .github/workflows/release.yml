name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  run:
    runs-on: ubuntu-latest
    environment:
      name: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev
      - name: Run tests
        run: uv run pytest --tb=short
      - name: Build Package
        run: uv build
      - name: Publish
        run: uv publish
